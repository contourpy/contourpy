name: Build binary wheels and sdist

on:
  push:
    tags:
      - v*
  schedule:
    - cron: "12 02 * * SUN"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  build_wheels:
    name: ${{ matrix.platform }} ${{ matrix.arch }} wheels
    if: github.repository_owner == 'contourpy'
    runs-on: ${{ matrix.os }}
    env:
      CIBW_PRERELEASE_PYTHONS: True

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-24.04-arm
            arch: aarch64
            platform: linux
          - os: ubuntu-24.04
            arch: ppc64le
            platform: linux
          - os: ubuntu-24.04
            arch: riscv64
            platform: linux
          - os: ubuntu-24.04
            arch: s390x
            platform: linux
          - os: ubuntu-24.04
            arch: x86_64
            platform: linux

          # Pyodide
          - os: ubuntu-24.04
            arch: wasm32
            platform: pyodide

          # macOS
          - os: macOS-14
            arch: arm64
            platform: macos
          - os: macOS-15-intel
            arch: x86_64
            platform: macos

          # iOS
          - os: macOS-latest
            arch: arm64_iphoneos
            platform: ios
          - os: macOS-latest
            arch: arm64_iphonesimulator
            platform: ios
          - os: macOS-15-intel
            arch: x86_64_iphonesimulator
            platform: ios

          # Windows
          - os: windows-2022
            arch: AMD64
            platform: windows
          - os: windows-11-arm
            arch: ARM64
            platform: windows
          - os: windows-2022
            arch: x86
            platform: windows

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          platforms: all
          # Temporary workaround
          image: tonistiigi/binfmt:qemu-v8.1.5

      - name: Setup MSVC (32-bit)
        if: ${{ matrix.arch == 'x86' }}
        uses: bus1/cabuild/action/msdevshell@06ea2833eef61e9b0d0ce0d728416e617e4fb1fe # v1
        with:
          architecture: 'x86'

      - name: Fix PATH on win32
        # Avoid this in GHA: "ERROR: Found GNU link.exe instead of MSVC link.exe"
        if: ${{ matrix.arch == 'x86' }}
        run: |
          rm /c/Program\ Files/Git/usr/bin/link.EXE

      - name: Build wheels
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1.0
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_PLATFORM: ${{ matrix.platform }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels_${{ matrix.os }}_${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    if: github.repository_owner == 'contourpy'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install build

      - name: Build sdist
        run: |
          python -m build --sdist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: contourpy-sdist
          path: dist/*.tar.gz

  merge_wheels:
    name: Merge wheel build artifacts
    runs-on: ubuntu-24.04
    needs: build_wheels
    steps:
      - name: Merge artifacts
        uses: actions/upload-artifact/merge@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: contourpy-wheels
          pattern: wheels*
          delete-merged: true

  upload_nightlies:
    name: Upload nightly wheels
    if: github.repository_owner == 'contourpy' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: merge_wheels
    steps:
      - name: Download merged wheel artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: contourpy-wheels
          path: dist

      - name: List wheels
        run: ls -l dist

      - name: Upload wheels to scientific python
        uses: scientific-python/upload-nightly-action@e76cfec8a4611fd02808a801b0ff5a7d7c1b2d99 # 0.6.4
        with:
          artifacts_path: dist
          anaconda_nightly_upload_token: ${{ secrets.ANACONDA_ORG_UPLOAD_TOKEN }}
